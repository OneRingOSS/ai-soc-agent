apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources:
      - secrets
    providers:
      # Secretbox (NaCl XSalsa20-Poly1305) - recommended over aesgcm
      - secretbox:
          keys:
            - name: key1
              secret: <BASE64_ENCODED_32_BYTE_KEY>  # Generate with: head -c 32 /dev/urandom | base64
      
      # Identity provider (fallback)
      - identity: {}

# Why Secretbox > AES-GCM:
# - XSalsa20-Poly1305 is more resistant to timing attacks
# - Used by Signal, WireGuard, Tor
# - NaCl library is audited and proven
# - Same performance as AES-GCM

# Setup is identical to aesgcm (see encryption-config-aesgcm.yaml)
