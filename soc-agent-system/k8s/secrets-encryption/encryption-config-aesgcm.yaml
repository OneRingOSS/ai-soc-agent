apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources:
      - secrets
      - configmaps  # Optional: also encrypt ConfigMaps
    providers:
      # AES-GCM with 256-bit key (primary)
      - aesgcm:
          keys:
            - name: key1
              secret: <BASE64_ENCODED_32_BYTE_KEY>  # Generate with: head -c 32 /dev/urandom | base64
      
      # Identity provider (fallback - allows reading old unencrypted secrets)
      - identity: {}

# How to use:
# 1. Generate encryption key:
#    head -c 32 /dev/urandom | base64
#
# 2. Replace <BASE64_ENCODED_32_BYTE_KEY> above
#
# 3. Save this file on K8s control plane node:
#    /etc/kubernetes/encryption-config.yaml
#
# 4. Update kube-apiserver manifest:
#    /etc/kubernetes/manifests/kube-apiserver.yaml
#    Add:
#      - --encryption-provider-config=/etc/kubernetes/encryption-config.yaml
#    Mount:
#      volumeMounts:
#        - name: encryption-config
#          mountPath: /etc/kubernetes/encryption-config.yaml
#          readOnly: true
#      volumes:
#        - name: encryption-config
#          hostPath:
#            path: /etc/kubernetes/encryption-config.yaml
#            type: File
#
# 5. Restart kube-apiserver (automatically happens when manifest changes)
#
# 6. Encrypt existing secrets:
#    kubectl get secrets --all-namespaces -o json | kubectl replace -f -
#
# 7. Verify encryption:
#    ETCDCTL_API=3 etcdctl get /registry/secrets/default/redis-auth-secret | hexdump -C
#    # Should see: k8s:enc:aesgcm:v1:key1:<encrypted_data>
#    # NOT: redis_password_in_plaintext

# Key rotation:
# 1. Add new key as first entry:
#    - aesgcm:
#        keys:
#          - name: key2
#            secret: <NEW_KEY>
#          - name: key1
#            secret: <OLD_KEY>
# 2. Restart kube-apiserver
# 3. Re-encrypt all secrets: kubectl get secrets --all-namespaces -o json | kubectl replace -f -
# 4. Remove old key after 24h
