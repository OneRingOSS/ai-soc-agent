apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockautomounttoken
  annotations:
    description: Blocks pods that automount ServiceAccount tokens (least-privilege principle)
spec:
  crd:
    spec:
      names:
        kind: K8sBlockAutomountToken
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockautomounttoken

        violation[{"msg": msg}] {
          # Check if automountServiceAccountToken is explicitly set to true
          input.review.object.spec.automountServiceAccountToken == true
          msg := sprintf("Pod %v/%v violates security policy: automountServiceAccountToken must be false (least-privilege principle)", [input.review.object.metadata.namespace, input.review.object.metadata.name])
        }

        violation[{"msg": msg}] {
          # If automountServiceAccountToken is not set, deny by default (fail-closed)
          not has_field(input.review.object.spec, "automountServiceAccountToken")
          msg := sprintf("Pod %v/%v violates security policy: automountServiceAccountToken must be explicitly set to false", [input.review.object.metadata.namespace, input.review.object.metadata.name])
        }

        has_field(obj, field) {
          obj[field]
        }
