# ServiceAccounts for SOC Agent components
# Tier 1I: Least-privilege - blocks automatic token mounting to prevent cross-pod secret access
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "soc-agent.fullname" . }}-backend
  labels:
    {{- include "soc-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
automountServiceAccountToken: false  # Tier 1I: Disable automatic token mounting

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "soc-agent.fullname" . }}-frontend
  labels:
    {{- include "soc-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false  # Tier 1I: Disable automatic token mounting

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "soc-agent.fullname" . }}-redis
  labels:
    {{- include "soc-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
automountServiceAccountToken: false  # Tier 1I: Disable automatic token mounting
